
<!DOCTYPE html>

    <meta charset="UTF-8">
    <title>Contact | Coral Coast Turtle Rescue</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="brand">
            <img src="CoralCoastTurtleRescue1.jpg" alt="Logo">
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About sea turtles</a></li>

            </ul>
        </nav>
    </header>

    <main>
        <h2>Spotted an Injured Turtle?</h2>
        <p>Contact our 24/7 rescue hotline immediately.</p>
        <br>
        <div class="contact-form-container">
            <form class="contact-form">
                <input type="text" class="contact-input" placeholder="Your Name">
                <input type="email" class="contact-input" placeholder="Your Email">
                <textarea class="contact-textarea" placeholder="Message or Location of Sighting" rows="5"></textarea>
                <button type="submit" class="contact-button">Send Alert</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Coral Coast Turtle Rescue. Saving South Florida's Coastlines.</p>
    </footer>
