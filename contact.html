
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact | Coral Coast Turtle Rescue</title>
</head>
<body style="box-sizing: border-box; margin: 0; padding: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; line-height: 1.6; color: #081C15; background-color: #F1FAEE;">
    <header style="background: white; padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid #FF8A5B;">
        <div style="display: flex; align-items: center; gap: 10px;">
            <img src="CoralCoastTurtleRescue1.jpg" alt="Logo" style="width: 80px; height: auto;">
        </div>
        <nav>
            <ul style="display: flex; list-style: none; gap: 20px; margin: 0; padding: 0;">
                <li><a href="index.html" style="text-decoration: none; color: #1B4332; font-weight: bold;">Home</a></li>
                <li><a href="about.html" style="text-decoration: none; color: #1B4332; font-weight: bold;">About sea turtles</a></li>
                <li><a href="stories.html" style="text-decoration: none; color: #1B4332; font-weight: bold;">Success Stories</a></li>
                <li><a href="involved.html" style="text-decoration: none; color: #1B4332; font-weight: bold;">Get Involved</a></li>
                <li><a href="contact.html" style="text-decoration: none; color: #1B4332; font-weight: bold;">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main style="max-width: 1100px; margin: 2rem auto; padding: 0 20px;">
        <h2>Spotted an Injured Turtle?</h2>
        <p>Contact our 24/7 rescue hotline immediately.</p>
        <br>
        <div style="flex: 1; background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); max-width: 600px; margin: auto;">
            <form style="display: flex; flex-direction: column; gap: 15px;">
                <input type="text" placeholder="Your Name" style="padding: 10px; box-sizing: border-box; width: 100%;">
                <input type="email" placeholder="Your Email" style="padding: 10px; box-sizing: border-box; width: 100%;">
                <textarea placeholder="Message or Location of Sighting" rows="5" style="padding: 10px; box-sizing: border-box; width: 100%;"></textarea>
                <button type="submit" style="background: #2EB67D; color: white; border: none; padding: 15px; cursor: pointer; width: 100%; border-radius: 5px;">Send Alert</button>
            </form>
        </div>
    </main>

    <footer style="background: #1B4332; color: white; text-align: center; padding: 2rem; margin-top: 4rem;">
        <p>&copy; 2026 Coral Coast Turtle Rescue. Saving South Florida's Coastlines.</p>
    </footer>
